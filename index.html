<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dikr">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Compteur de Dikr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #0d1b2a 0%, #1b3a4b 50%, #0d2137 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e0d6c2; }
    .container { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 32px; width: 360px; max-width: 95vw; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    .bismillah { font-size: 22px; color: #c9a84c; margin-bottom: 8px; }
    h1 { font-size: 15px; font-weight: 400; color: #a0bfd6; margin-bottom: 28px; letter-spacing: 2px; text-transform: uppercase; }
    .dikr-select-label { font-size: 12px; color: #8aa9bf; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    select { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #e0d6c2; font-size: 13px; padding: 10px 14px; outline: none; cursor: pointer; margin-bottom: 20px; }
    select option { background: #1b3a4b; }
    .arabic { font-size: 28px; line-height: 1.7; color: #c9a84c; margin-bottom: 6px; direction: rtl; }
    .transliteration { font-size: 13px; color: #8aa9bf; font-style: italic; margin-bottom: 6px; }
    .translation { font-size: 12px; color: #6e8ea3; margin-bottom: 28px; }
    .goal-section { margin-bottom: 20px; }
    .goal-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #8aa9bf; }
    .goal-row input { width: 70px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #e0d6c2; font-size: 13px; padding: 5px 8px; text-align: center; outline: none; }
    .progress-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #c9a84c, #f0d080); border-radius: 10px; transition: width 0.3s; }
    .counter-display { font-size: 86px; font-weight: 700; color: #fff; line-height: 1; margin: 16px 0; text-shadow: 0 0 30px rgba(201,168,76,0.4); transition: transform 0.1s; }
    .counter-display.pulse { transform: scale(1.07); }
    .sessions-info { font-size: 12px; color: #6e8ea3; margin-bottom: 24px; }
    .btn-count { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #c9a84c; background: radial-gradient(circle at 40% 40%, rgba(201,168,76,0.2), rgba(201,168,76,0.067)); color: #c9a84c; font-size: 40px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; box-shadow: 0 0 24px rgba(201,168,76,0.2); user-select: none; -webkit-tap-highlight-color: transparent; }
    .btn-count:active { background: radial-gradient(circle at 40% 40%, rgba(201,168,76,0.4), rgba(201,168,76,0.133)); transform: scale(0.95); box-shadow: 0 0 40px rgba(201,168,76,0.5); }
    .btn-row { display: flex; gap: 12px; justify-content: center; }
    .btn-small { flex: 1; padding: 11px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #a0bfd6; font-size: 13px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    .btn-small:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-small.danger:hover { background: rgba(220,60,60,0.2); border-color: rgba(220,60,60,0.4); color: #ff8a8a; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #c9a84c; color: #0d1b2a; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; opacity: 0; transition: 0.4s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .completed-badge { display: none; background: linear-gradient(135deg, #c9a84c, #f0d080); color: #0d1b2a; border-radius: 12px; padding: 10px 16px; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
    .vibration-toggle { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 12px; color: #8aa9bf; cursor: pointer; user-select: none; }
    .toggle-switch { width: 36px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; transition: background 0.3s; border: 1px solid rgba(255,255,255,0.15); }
    .toggle-switch.on { background: #c9a84c; }
    .toggle-knob { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left 0.3s; }
    .toggle-switch.on .toggle-knob { left: 18px; }
    #installBanner { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1b3a4b; border-top: 1px solid #c9a84c; padding: 14px 20px; flex-direction: row; align-items: center; justify-content: space-between; z-index: 1000; gap: 10px; }
    #installBanner span { font-size: 13px; color: #e0d6c2; flex: 1; }
    #installBanner button { background: #c9a84c; color: #0d1b2a; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    #installBanner .dismiss { background: transparent; color: #8aa9bf; font-weight: 400; }
    #customInput input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #e0d6c2; font-size: 14px; padding: 10px 14px; outline: none; }
  </style>
</head>
